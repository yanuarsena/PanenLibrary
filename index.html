<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Apple PWA Standalone Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PANEN">
  
  <!-- Theme Color for Browser Header -->
  <meta name="theme-color" content="#0A4D2E">
  
  <title>PANEN Mobile - Koperasi Digital</title>
  
  <!-- Link manifest PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Ikon untuk iOS -->
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1ekHgK-EX0uCEq4YUUwKXcmy4O-VH3d7R">
  <link rel="shortcut icon" href="https://lh3.googleusercontent.com/d/1ekHgK-EX0uCEq4YUUwKXcmy4O-VH3d7R" type="image/x-icon">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Sans Font -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html, body {
      background-color: #0A4D2E !important; /* Hijau botol solid untuk seamless status bar */
      margin: 0 !important;
      padding: 0 !important;
      height: 100% !important;
      width: 100% !important;
      overflow: hidden !important;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* PWA Iframe Shell - Melar penuh 100% menutupi seluruh screen fisik HP */
    .pwa-iframe-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      margin: 0 !important;
      padding: 0 !important;
      z-index: 10;
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
    }

    /* Layar fallback cerdas saat koneksi internet terputus (Offline Screen) */
    #offlineFallbackScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #042F1A 0%, #0A4D2E 100%);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: #ffffff;
    }

    /* Layar Loading Indikator Premium */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #042F1A 0%, #0A4D2E 100%);
      z-index: 99;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: #ffffff;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>

  <!-- ================= LAYAR LOADING PREMIUM (SINKRONISASI INDIKATOR) ================= -->
  <div id="loadingScreen">
    <div class="space-y-6 max-w-xs mx-auto flex flex-col items-center">
      <!-- Logo Badge Koperasi PANEN -->
      <div class="w-24 h-24 flex items-center justify-center relative">
        <div class="absolute inset-0 rounded-full bg-yellow-500/10 filter blur-xl animate-pulse"></div>
        <img src="https://lh3.googleusercontent.com/d/1ekHgK-EX0uCEq4YUUwKXcmy4O-VH3d7R" referrerpolicy="no-referrer" alt="PANEN Logo" class="w-20 h-20 relative z-10 object-contain bg-transparent">
      </div>
      
      <div class="space-y-1">
        <h2 class="text-xs font-black text-[#EAB308] tracking-widest uppercase">PANEN MOBILE</h2>
        <p class="text-[9px] text-emerald-300 font-extrabold tracking-widest uppercase">Menghubungkan ke Server...</p>
      </div>

      <!-- Luxury Spinning Gold Loader -->
      <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-yellow-500"></div>

      <!-- SMART TIMEOUT HELPER: Muncul otomatis jika Google memblokir Iframe karena butuh login Google -->
      <div id="timeoutHelper" class="hidden opacity-0 scale-95 transition-all duration-500 mt-6 px-4 py-3.5 bg-white/10 rounded-2xl border border-white/20 max-w-xs text-center">
        <p class="text-[10px] text-emerald-200 leading-relaxed font-semibold mb-3">
          Jika layar tetap hijau, browser Anda mungkin memblokir otorisasi login Google di dalam aplikasi.
        </p>
        <button onclick="openDirectly()" class="w-full py-2 bg-gradient-to-r from-amber-400 to-yellow-500 hover:from-amber-500 hover:to-yellow-600 text-slate-950 rounded-xl font-extrabold text-[10px] tracking-wide uppercase transition active:scale-95 shadow-md">
          <i class="fa-solid fa-arrow-up-right-from-square mr-1"></i> Buka Aplikasi Langsung
        </button>
      </div>
    </div>
  </div>

  <!-- OFFLINE FALLBACK SCREEN (Akan otomatis muncul jika koneksi HP Anggota mati) -->
  <div id="offlineFallbackScreen">
    <div class="space-y-6 max-w-xs mx-auto">
      <div class="w-24 h-24 bg-white/10 rounded-full flex items-center justify-center mx-auto border border-white/20 animate-pulse">
        <i class="fa-solid fa-wifi-slash text-4xl text-amber-400"></i>
      </div>
      
      <div class="space-y-2">
        <h1 class="text-xl font-extrabold tracking-tight">Koneksi Terputus</h1>
        <p class="text-xs text-emerald-200 leading-relaxed font-semibold">
          PANEN Mobile memerlukan koneksi internet aktif untuk menarik data keuangan Anda secara real-time dari server Google.
        </p>
      </div>

      <button onclick="window.location.reload();" class="w-full py-3.5 bg-gradient-to-r from-[#F59E0B] to-[#D97706] text-[#042F1A] font-black text-xs uppercase tracking-wider rounded-full active:scale-95 transition duration-150 focus:outline-none shadow-lg shadow-yellow-950/40">
        <i class="fa-solid fa-rotate-right mr-1.5"></i> Coba Hubungkan Kembali
      </button>
    </div>
  </div>

  <!-- SEAMLESS NATIVE APPS SCRIPT IFRAME -->
  <iframe id="pwaIframe" src="" class="pwa-iframe-container" allow="geolocation; microphone; camera"></iframe>

  <script>
    // ========================================================
    // SINKRONISASI LINK BACKEND APPS SCRIPT (ZETTBOS CONFIG)
    // ========================================================
    
    // GANTI TULISAN DI BAWAH INI DENGAN LINK WEB APP /EXEC SPREADSHEET SANGAT UTUH!
    // Contoh: "https://script.google.com/macros/s/AKfycb.../exec"
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwd7Iv6QWJusb-dU0js3CuQCAPwo_mh_DqRmHN8o41f7KNUaCyxuMNVY0EnTK9LU6Ky/exec";

    function openDirectly() {
      if (GAS_WEB_APP_URL && GAS_WEB_APP_URL !== "https://script.google.com/macros/s/AKfycbwd7Iv6QWJusb-dUOjs3CuQCAPwo_mh_DqRmHN8o41f7KNUaCyxuMNVY0EnTK9LU6Ky/exec") {
        window.open(GAS_WEB_APP_URL, '_blank');
      }
    }

    window.addEventListener('load', () => {
      const iframe = document.getElementById('pwaIframe');
      const offlineScreen = document.getElementById('offlineFallbackScreen');
      const loadingScreen = document.getElementById('loadingScreen');
      const timeoutHelper = document.getElementById('timeoutHelper');

      // 1. Hilangkan layar loading saat iframe sukses memuat konten Apps Script
      iframe.addEventListener('load', () => {
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 500);
      });

      // 2. Aktifkan Helper Timeout jika dalam 6 detik iframe gagal memuat karena terblokir Google login
      setTimeout(() => {
        if (loadingScreen.style.display !== 'none') {
          timeoutHelper.classList.remove('hidden', 'opacity-0', 'scale-95');
          timeoutHelper.classList.add('opacity-100', 'scale-100');
        }
      }, 6000);

      // 3. Tembakkan URL Apps Script ke dalam iframe shell
      if (GAS_WEB_APP_URL && GAS_WEB_APP_URL !== "TEMPEL_URL_WEB_APP_APPS_SCRIPT_LO_DISINI") {
        iframe.src = GAS_WEB_APP_URL;
      } else {
        alert("Peringatan: Kamu belum memasukkan URL Google Apps Script di file pwa_wrapper.html!");
      }

      // 4. Monitoring Status Koneksi HP Anggota secara Real-Time
      function updateConnectionStatus() {
        if (navigator.onLine) {
          offlineScreen.style.display = 'none';
          if (loadingScreen.style.display === 'none') {
            iframe.style.display = 'block';
          }
        } else {
          offlineScreen.style.display = 'flex';
          iframe.style.display = 'none';
        }
      }

      window.addEventListener('online', updateConnectionStatus);
      window.addEventListener('offline', updateConnectionStatus);
      updateConnectionStatus(); // Inisialisasi awal saat PWA pertama dibuka
    });

    // ========================================================
    // REGISTRASI SERVICE WORKER PWA SECARA RESMI (NATIVE)
    // ========================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Zettbos PWA Service Worker Registered! Scope: ', reg.scope))
          .catch(err => console.log('PWA Service Worker Registration Failed: ', err));
      });
    }
  </script>
</body>
</html>
